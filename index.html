<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ZINK</title>

<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: white;
    color: black;
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: white;
    z-index: 1000;
}

.logo {
    font-weight: bold;
    font-size: 20px;
    letter-spacing: 2px;
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
}

/* MENU */
.sidebar {
    position: fixed;
    left: -300px;
    top: 0;
    width: 300px;
    height: 100%;
    background: white;
    padding: 40px;
    transition: 0.4s;
}

.sidebar a {
    display: block;
    margin: 20px 0;
    font-size: 18px;
    text-decoration: none;
    color: black;
}

.sidebar.active {
    left: 0;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 60px;
    letter-spacing: 10px;
}

/* COLLECTION */
.collection {
    padding: 100px 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
}

.item {
    text-align: center;
}

.placeholder {
    width: 100%;
    height: 300px;
    background: #eee;
}

.item p {
    margin-top: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    font-size: 14px;
    border-top: 1px solid #ddd;
}
</style>

</head>

<body>

<!-- MENU -->
<div class="sidebar" id="menu">
    <a href="#collection">Produits</a>
</div>

<!-- HEADER -->
<header>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="logo">ZINK</div>
</header>

<!-- HERO -->
<section class="hero">
    ZINK
</section>

<!-- COLLECTION -->
<section class="collection" id="collection">

    <div class="grid">

        <div class="item">
            <div class="placeholder"></div>
            <p>Pull</p>
        </div>

        <div class="item">
            <div class="placeholder"></div>
            <p>Veste</p>
        </div>

        <div class="item">
            <div class="placeholder"></div>
            <p>T-shirt</p>
        </div>

    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>Instagram : @mathis_spamz</p>
    <p>TikTok : @mathis_spamz</p>
</footer>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
